dataset_name: walk_matched_v1_64clean_rsca_relative_xyz
cache_subdir: data/cache_walk_matched_v1_64clean

defaults:
  window_seconds: 3.0
  stride_samples: 400
  pred_horizon_samples: 0

lag_diagnostics:
  max_lag_ms: 1000.0

experiment:
  track: auxiliary_directional_benchmark
  description: 右侧骨架 marker 轨迹减去同一时刻 RSCA 的相对坐标 benchmark

monitor:
  default_render_mode: skeleton
  plane_mode: lab_axis_approx
  axis_semantics:
    x: 前后
    y: 左右
    z: 上下
  target_space: marker_coordinate
  target_summary: 右侧骨架 marker 相对 RSCA 的 xyz 轨迹（去掉 RSCA 自身）
  skeleton_edges:
    - [RPEL, RHIP, RKNE, RANK, RMTP, RHTOE]
    - [RSCA, RSHO, RELB, RWRI, RMCP, RFTOE]
    - [RPEL, RSCA]

vicon:
  target_mode: markers_xyz
  target_axes: xyz
  relative_origin_marker: RSCA
  time_column: null
  frame_column: null
  fps: null
  joints: null

