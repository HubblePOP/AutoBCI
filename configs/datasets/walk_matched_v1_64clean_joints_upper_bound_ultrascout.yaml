dataset_name: walk_matched_v1_64clean_joints_upper_bound_ultrascout
cache_subdir: data/cache_walk_matched_v1_64clean_joints

defaults:
  window_seconds: 3.0
  stride_samples: 400
  pred_horizon_samples: 0

lag_diagnostics:
  max_lag_ms: 1000.0

experiment:
  track: within_session_upper_bound_ultrascout
  description: 同试次纯脑电 moonshot 的 ultra-scout 口径，只缩减 session 数量和训练预算，不改 target 和时间切分语义

temporal_split:
  enabled: true
  source_split: train
  train_fraction: 0.7
  val_fraction: 0.15
  test_fraction: 0.15

quality_masks: {}

monitor:
  default_render_mode: marker
  plane_mode: lab_axis_approx
  axis_semantics:
    x: 前后
    y: 左右
    z: 上下
  target_space: joint_angle
  target_summary: 第二个 sheet 的关节角（same-session ultra-scout）
  skeleton_edges:
    - [RPEL, RHIP, RKNE, RANK, RMTP, RHTOE]
    - [RSCA, RSHO, RELB, RWRI, RMCP, RFTOE]
    - [RPEL, RSCA]

vicon:
  target_mode: joints_sheet
  time_column: null
  frame_column: null
  fps: null
  joints: null

